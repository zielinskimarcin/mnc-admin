name: Push Cron (manual fallback)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase scheduled push function
        run: |
          curl -sS -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.SUPABASE_CRON_SECRET }}" \
            -d "{}"
